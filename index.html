<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Registo mensal de horas de trabalho e despesas dedutíveis.">
  <meta name="theme-color" content="#0b0f19">
  <title>HourFlow – Registo de Horas &amp; Diversos</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HourFlow">
  <link rel="apple-touch-icon" href="icon.svg">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css?v=6">
</head>
<body>

  <div class="app-container">
    <main class="phone-frame">

      <div class="phone-header-glow"></div>

      <!-- Header -->
      <header class="app-header">
        <div class="brand">
          <span class="logo-dot"></span>
          <h1>HourFlow</h1>
        </div>
        <div class="month-selector">
          <button id="prev-month-btn" class="nav-arrow-btn" aria-label="Mês anterior">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <div class="month-display-container">
            <span id="current-month-display">Junho 2026</span>
            <select id="month-select" class="hidden-select"></select>
          </div>
          <button id="next-month-btn" class="nav-arrow-btn" aria-label="Próximo mês">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </div>
      </header>

      <!-- Dashboard -->
      <section class="dashboard-section">
        <div class="dashboard-card glow-card">
          <div class="net-receive-label">Líquido a Receber</div>
          <div class="net-receive-value" id="net-value">0,00 €</div>
          <div class="summary-divider"></div>
          <div class="summary-grid">
            <div class="summary-item"><span class="summary-title">Horas</span><span class="summary-val" id="total-hours">0 h</span></div>
            <div class="summary-item"><span class="summary-title">Bruto (Mês)</span><span class="summary-val" id="gross-value">0,00 €</span></div>
            <div class="summary-item"><span class="summary-title">Diversos</span><span class="summary-val expense-color" id="total-expenses">0,00 €</span></div>
            <div class="summary-item"><span class="summary-title">Transitado</span><span class="summary-val" id="total-carried">0,00 €</span></div>
            <div class="summary-item"><span class="summary-title">Pago (Mês)</span><span class="summary-val" id="total-paid">0,00 €</span></div>
          </div>
        </div>
      </section>

      <!-- Entry Form -->
      <section class="form-section">
        <div class="entry-card">
          <!-- Tabs -->
          <div class="tab-container">
            <div class="tab-slider"></div>
            <button type="button" class="tab-btn active" data-tab="hours">Horas</button>
            <button type="button" class="tab-btn" data-tab="expenses">Diversos</button>
            <button type="button" class="tab-btn" data-tab="payments">Pagamento</button>
          </div>

          <form id="entry-form" autocomplete="off">
            <!-- Calendar Date Picker -->
            <div class="input-group">
              <div class="calendar-header-row">
                <label>Seleciona o Dia</label>
                <span id="selected-date-label" class="selected-date-label">—</span>
              </div>
              <input type="hidden" id="entry-date">
              <div id="calendar-widget" class="calendar-widget">
                <!-- Day-of-week headers -->
                <div class="calendar-dow">
                  <span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span><span>Dom</span>
                </div>
                <div id="calendar-grid" class="calendar-grid"></div>
              </div>
              <!-- Dot legend -->
              <div class="cal-legend">
                <span class="dot dot-hours"></span>Horas
                <span class="dot dot-expense"></span>Diversos
                <span class="dot dot-payment"></span>Pagamento
              </div>
            </div>

            <!-- Hours inputs -->
            <div id="hours-inputs" class="form-fields-container active">
              <div class="input-group">
                <label for="hours-count">Quantidade de Horas</label>
                <div class="input-wrapper">
                  <input type="number" id="hours-count" placeholder="Ex: 8" min="0.1" step="any" inputmode="decimal">
                  <span class="input-unit">h</span>
                </div>
              </div>
            </div>

            <!-- Expense inputs -->
            <div id="expense-inputs" class="form-fields-container">
              <div class="input-group">
                <label for="expense-amount">Valor (Diversos)</label>
                <div class="input-wrapper">
                  <input type="number" id="expense-amount" placeholder="Ex: 12.50" min="0.01" step="any" inputmode="decimal">
                  <span class="input-unit">€</span>
                </div>
              </div>
              <div class="input-group">
                <label>Tipo</label>
                <div class="radio-group" style="display:flex;gap:1rem;margin-top:0.5rem;">
                  <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;">
                    <input type="radio" name="expense-nature" value="debit" checked><span>Débito</span>
                  </label>
                  <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;">
                    <input type="radio" name="expense-nature" value="credit"><span>Crédito (Reembolso)</span>
                  </label>
                </div>
              </div>
              <div class="input-group">
                <label for="expense-desc">Descrição</label>
                <div class="input-wrapper">
                  <input type="text" id="expense-desc" placeholder="Ex: Almoço, Portagens">
                  <span class="input-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></span>
                </div>
              </div>
            </div>

            <!-- Payment inputs -->
            <div id="payment-inputs" class="form-fields-container">
              <div class="input-group">
                <label for="payment-amount">Valor Pago</label>
                <div class="input-wrapper">
                  <input type="number" id="payment-amount" placeholder="Ex: 50.00" min="0.01" step="any" inputmode="decimal">
                  <span class="input-unit">€</span>
                </div>
              </div>
              <div class="input-group">
                <label for="payment-desc">Nota (Opcional)</label>
                <div class="input-wrapper">
                  <input type="text" id="payment-desc" placeholder="Ex: Adiantamento, Fecho do mês">
                  <span class="input-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></span>
                </div>
              </div>
            </div>

            <button type="submit" id="submit-btn" class="submit-btn">
              <span>Registar Horas</span>
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </button>
          </form>
        </div>
      </section>

      <!-- History -->
      <section class="history-section">
        <h2 class="section-title">Histórico Mensal</h2>
        <div id="history-container" class="history-container">
          <div class="empty-state" id="empty-state">
            <div class="empty-icon-wrapper">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M12 8v8"/><path d="m9 11 3-3 3 3"/></svg>
            </div>
            <p>Nenhum registo este mês</p>
            <span class="empty-sub">Seleciona um dia no calendário acima.</span>
          </div>
          <ul id="history-list" class="history-list"></ul>
        </div>
      </section>

      <!-- Footer -->
      <footer class="app-footer">
        <div class="footer-btns">
          <button id="whatsapp-btn" class="footer-btn footer-btn--whatsapp">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
            <span>Relatório</span>
          </button>
          <button id="pdf-btn" class="footer-btn footer-btn--pdf">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/></svg>
            <span>Gerar PDF</span>
          </button>
        </div>
      </footer>

      <!-- Report Modal -->
      <div id="whatsapp-modal" class="modal-overlay hidden">
        <div class="modal-content">
          <h3 class="modal-title">Pré-visualização</h3>
          <textarea id="whatsapp-preview-text" class="preview-text"></textarea>
          <div class="modal-actions">
            <div class="modal-actions-row">
              <button id="confirm-whatsapp-btn" class="action-btn action-btn--whatsapp">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                <span>WhatsApp</span>
              </button>
              <button id="email-btn" class="action-btn action-btn--email">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                <span>Email</span>
              </button>
            </div>
            <div class="modal-actions-row">
              <button id="download-btn" class="action-btn action-btn--secondary">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                <span>Guardar .txt</span>
              </button>
              <button id="share-btn" class="action-btn action-btn--secondary">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>
                <span>Partilhar</span>
              </button>
            </div>
            <button id="close-modal-btn" class="secondary-btn">Voltar</button>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="app.js?v=6"></script>
</body>
</html>
